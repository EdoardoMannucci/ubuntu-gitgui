name: Release

# ─────────────────────────────────────────────────────────────────────────────
# Trigger: push a version tag.
#
#   Pre-release  →  tag like  v0.1.0-alpha  /  v0.2.0-beta.1  /  v1.0.0-rc2
#   Stable       →  tag like  v1.0.0
#
# Workflow:
#   1. Build a self-contained Linux bundle with PyInstaller  (--onedir)
#   2. Package it as a Debian .deb  via create_deb.sh
#   3. Archive the portable bundle as a .tar.gz
#   4. Create (or update) the GitHub Release and upload both assets
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # required to create/upload releases

jobs:
  build-and-release:
    name: Build & Release (${{ github.ref_name }})
    runs-on: ubuntu-22.04

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for changelog generation

      # ── 2. Parse version from tag ──────────────────────────────────────────
      # TAG_NAME  = v0.1.0-alpha
      # VERSION   = 0.1.0-alpha   (stripped "v")
      # PRERELEASE = true/false   (contains a pre-release segment)
      - name: Parse version
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VER="${TAG#v}"
          echo "tag=${TAG}"     >> "$GITHUB_OUTPUT"
          echo "version=${VER}" >> "$GITHUB_OUTPUT"
          if [[ "${VER}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=true"  >> "$GITHUB_OUTPUT"
          fi

      # ── 3. System dependencies (Qt / PyQt6 build requirements) ────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgl1 \
            libegl1 \
            libxkbcommon-x11-0 \
            libglib2.0-0 \
            libdbus-1-3 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-xinerama0 \
            libxcb-xfixes0 \
            libxcb-cursor0 \
            dpkg \
            fakeroot

      # ── 4. Set up Python ───────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 5. Install Python dependencies ────────────────────────────────────
      - name: Install Python dependencies
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

      # ── 6. Static sanity check ─────────────────────────────────────────────
      - name: Compile sources
        run: |
          source venv/bin/activate
          python -m compileall main.py src tests

      # ── 7. Run test suite ──────────────────────────────────────────────────
      - name: Run tests
        run: |
          source venv/bin/activate
          python -m unittest discover -s tests -v

      # ── 8. Build PyInstaller bundle ────────────────────────────────────────
      - name: Build with PyInstaller
        run: |
          source venv/bin/activate
          chmod +x build.sh
          PYTHON="$PWD/venv/bin/python" ./build.sh

      # ── 9. Create portable .tar.gz archive ────────────────────────────────
      - name: Create portable tar.gz
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ARCHIVE="ubuntu-gitgui-linux-amd64-${VERSION}.tar.gz"
          tar -czf "${ARCHIVE}" -C dist ubuntu-gitgui
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"
          echo "archive_size=$(du -sh "${ARCHIVE}" | cut -f1)" >> "$GITHUB_ENV"

      # ── 10. Build .deb package ─────────────────────────────────────────────
      - name: Build .deb package
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          chmod +x create_deb.sh
          # dpkg-deb needs root-like ownership; fakeroot handles this on CI
          fakeroot ./create_deb.sh "${VERSION}"
          DEB="ubuntu-gitgui_${VERSION}_amd64.deb"
          echo "DEB=${DEB}" >> "$GITHUB_ENV"
          echo "deb_size=$(du -sh "${DEB}" | cut -f1)" >> "$GITHUB_ENV"

      # ── 11. Verify artifacts exist ─────────────────────────────────────────
      - name: Verify artifacts
        run: |
          ls -lh "${{ env.ARCHIVE }}" "${{ env.DEB }}"

      # ── 12. Generate release notes from CHANGELOG.md ──────────────────────
      - name: Extract release notes
        id: release_notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Extract the section matching this version from CHANGELOG.md
          # Falls back to a generic message if the section is missing.
          if grep -q "## \[${VERSION}\]" CHANGELOG.md 2>/dev/null; then
            awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" \
              CHANGELOG.md > release_body.md
          else
            cat > release_body.md <<NOTES
          ## ubuntu-gitgui ${VERSION}

          Portable Linux binary and Debian package for ubuntu-gitgui ${VERSION}.

          ### Installation

          **Option A — Debian / Ubuntu (.deb)**
          \`\`\`bash
          sudo dpkg -i ubuntu-gitgui_${VERSION}_amd64.deb
          \`\`\`
          The app will appear in your application launcher automatically.

          **Option B — Portable bundle (.tar.gz)**
          \`\`\`bash
          tar -xzf ubuntu-gitgui-linux-amd64-${VERSION}.tar.gz
          cd ubuntu-gitgui
          ./ubuntu-gitgui
          \`\`\`

          ### Requirements
          - Ubuntu 22.04+ / Debian 12+ (x86-64)
          - A working display (X11 or Wayland)

          > **Note:** this is a pre-release. Expect rough edges and please [report bugs](../../issues).
          NOTES
          fi

      # ── 13. Create GitHub Release ─────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "ubuntu-gitgui ${{ steps.version.outputs.version }}"
          body_path: release_body.md
          prerelease: ${{ steps.version.outputs.prerelease }}
          draft: false
          files: |
            ${{ env.DEB }}
            ${{ env.ARCHIVE }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
